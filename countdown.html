<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PWA Reseller License System</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.25.17/dist/css/uikit.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.25.17/dist/js/uikit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/uikit@3.25.17/dist/js/uikit-icons.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
<script>
fetch("./data.json")
.then(r => r.json())
.then(data => {

    const license = data.license;
    const expireTime = new Date(license.expires).getTime();

    // STEP 1: check disabled
    if (license.disabled) {
        lock();
        return;
    }

    // STEP 2: check expired
    if (Date.now() >= expireTime) {
        lock();
        return;
    }

    // STEP 3: allow app to show
    document.getElementById("app").style.display = "block";

    function lock() {
    document.getElementById("app").style.display = "none";
    UIkit.modal("#license-modal").show();

    document.getElementById("contact-provider").onclick = () => {
        window.location.href = license.redirect;
    };
}

});
</script>
    <style>
#app {
    display: none;
}
        h2 {
            font-family: Montserrat;
            font-weight: 800;
            text-transform: uppercase;
        }
        h4 {
            font-family: Montserrat;
            font-weight: 700;
        }
        p {
            font-family: Poppins;
        }
        .uk-button {
            font-family: Poppins;
            color: #fff;
            background-color: #000;
            border-radius: 30px;
        }
</style>
</head>
<body>
<div id="app">
<span id="countdown">00Y 00D 00H 00M 00S</span>
</div>

    <div id="license-modal" class="uk-modal-full" uk-modal="bg-close: false; esc-close: false">
        <div class="uk-modal-dialog uk-margin-auto-vertical uk-text-center uk-padding uk-position-relative" uk-height-viewport>
            <div class="uk-padding-large uk-position-center">
                <h2 class="uk-margin-small-bottom">Subscription Renewal Required</h2>
            <h4>Subscription has Expired or has been Disabled.</h4>
            <p>
                To Renew your Subscription or Reactivate your Account,
                Please Contact your Provider.
            </p>
            <button id="contact-provider" class="uk-button">
                Contact Provider
            </button></div>
        </div>
    </div>

<script>
const countdownEl = document.getElementById("countdown");
fetch("data.json")
  .then(res => {
    if (!res.ok) throw new Error("Unable to load data.json");
    return res.json();
  })
  .then(siteData => {
    const license = siteData.license;
    function showLicenseDialog() {

      UIkit.modal("#license-modal").show();

      document.getElementById("contact-provider").onclick = () => {
        window.location.href = license.redirect;
      };

    }
    if (!license) return;
    const expireTime = new Date(license.expires).getTime();
    const redirectURL = license.redirect;
    function redirect() {
      window.location.replace(redirectURL);
    }
    // Disabled by reseller
    if (license.disabled) {
      showLicenseDialog();
      return;
    }
    // Already expired
    if (Date.now() >= expireTime) {
      showLicenseDialog();
      return;
    }
    function updateCountdown() {
      let diff = expireTime - Date.now();
      if (diff <= 0) {
        clearInterval(timer);
        showLicenseDialog();
        return;
      }
      const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365));
      diff %= (1000 * 60 * 60 * 24 * 365);
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      diff %= (1000 * 60 * 60 * 24);
      const hours = Math.floor(diff / (1000 * 60 * 60));
      diff %= (1000 * 60 * 60);
      const minutes = Math.floor(diff / (1000 * 60));
      diff %= (1000 * 60);
      const seconds = Math.floor(diff / 1000);
      countdownEl.textContent =
        `${String(years).padStart(2, "0")}Y ` +
        `${String(days).padStart(2, "0")}D ` +
        `${String(hours).padStart(2, "0")}H ` +
        `${String(minutes).padStart(2, "0")}M ` +
        `${String(seconds).padStart(2, "0")}S`;
    }
    updateCountdown();
    const timer = setInterval(updateCountdown, 1000);
  })
  .catch(error => {
    console.error(error);
  });
</script>

</body>
</html>
