<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PWA Expiration Demo</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.21.16/dist/css/uikit.min.css" />
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.16/dist/js/uikit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.16/dist/js/uikit-icons.min.js"></script>

</head>
<body class="uk-container uk-padding">

<h1 class="uk-heading-small">PWA Subscription Countdown</h1>

<div id="status" class="uk-alert-primary uk-padding-small uk-margin" uk-alert>
    Checking subscription...
</div>

<div id="countdown"
     class="uk-grid-small uk-child-width-auto uk-text-center uk-margin-large-top"
     uk-grid
     uk-countdown>

    <div>
        <div class="uk-h1 uk-countdown-number uk-countdown-days"></div>
        <div class="uk-countdown-label">Days</div>
    </div>

    <div class="uk-h1">:</div>

    <div>
        <div class="uk-h1 uk-countdown-number uk-countdown-hours"></div>
        <div class="uk-countdown-label">Hours</div>
    </div>

    <div class="uk-h1">:</div>

    <div>
        <div class="uk-h1 uk-countdown-number uk-countdown-minutes"></div>
        <div class="uk-countdown-label">Minutes</div>
    </div>

    <div class="uk-h1">:</div>

    <div>
        <div class="uk-h1 uk-countdown-number uk-countdown-seconds"></div>
        <div class="uk-countdown-label">Seconds</div>
    </div>

</div>

<script>

//////////////////////////////////////////////////////
// CONFIG
//////////////////////////////////////////////////////

// Remote JSON license file
const LICENSE_URL =
"client1.json";

// Redirect after expiration
const REDIRECT_URL =
"https://m.me/yourreseller";

//////////////////////////////////////////////////////
// FETCH LICENSE
//////////////////////////////////////////////////////

fetch(LICENSE_URL)

.then(response => response.json())

.then(data => {

    const expireDate = data.expires;

    //////////////////////////////////////////////////////
    // UPDATE UIKIT COUNTDOWN
    //////////////////////////////////////////////////////

    const countdown = document.getElementById("countdown");

    countdown.setAttribute(
        "uk-countdown",
        `date: ${expireDate}`
    );

    //////////////////////////////////////////////////////
    // REINITIALIZE UIKIT COUNTDOWN
    //////////////////////////////////////////////////////

    UIkit.countdown(countdown);

    //////////////////////////////////////////////////////
    // STATUS
    //////////////////////////////////////////////////////

    document.getElementById("status").innerHTML =
    `Subscription active until:<br><strong>${expireDate}</strong>`;

    //////////////////////////////////////////////////////
    // CHECK EXPIRATION
    //////////////////////////////////////////////////////

    const expireTime = new Date(expireDate).getTime();

    const timer = setInterval(() => {

        const now = Date.now();

        if (now >= expireTime) {

            clearInterval(timer);

            document.getElementById("status").innerHTML =
            "Subscription expired. Redirecting...";

            window.location.href = REDIRECT_URL;

        }

    }, 1000);

})

.catch(error => {

    console.error(error);

    document.getElementById("status").innerHTML =
    "Unable to verify subscription.";

});

</script>

</body>
</html>
