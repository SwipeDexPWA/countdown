<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PWA Reseller License System</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.21.16/dist/css/uikit.min.css" />
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.16/dist/js/uikit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/uikit@3.21.16/dist/js/uikit-icons.min.js"></script>

</head>

<body class="uk-container uk-padding">

<!-- COUNTDOWN (plain text) -->
<div id="countdown" class="uk-text-normal uk-margin-large-top">
    00Y 00D 00H 00M 00S
</div>

<script>
const status = document.getElementById("status");
const countdownEl = document.getElementById("countdown");

const LICENSE_URL = "client1.json";

fetch(LICENSE_URL)
.then(res => {
    if (!res.ok) throw new Error("License file not found");
    return res.json();
})
.then(license => {

    const expireTime = new Date(license.expires).getTime();
    const redirectURL = license.redirect;

    // 🚨 disabled check
    if (license.disabled === true) {
        lock("Account disabled by reseller");
        return;
    }

    function updateCountdown() {
    const now = Date.now();
    let diff = expireTime - now;

    if (diff <= 0) {
        clearInterval(timer);
        lock("Subscription expired");
        return;
    }

    const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365));
    diff %= (1000 * 60 * 60 * 24 * 365);

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    diff %= (1000 * 60 * 60 * 24);

    const hours = Math.floor(diff / (1000 * 60 * 60));
    diff %= (1000 * 60 * 60);

    const minutes = Math.floor(diff / (1000 * 60));
    diff %= (1000 * 60);

    const seconds = Math.floor(diff / 1000);

    countdownEl.textContent =
        `${String(years).padStart(2, "0")}Y ` +
        `${String(days).padStart(2, "0")}D ` +
        `${String(hours).padStart(2, "0")}H ` +
        `${String(minutes).padStart(2, "0")}M ` +
        `${String(seconds).padStart(2, "0")}S`;
}

    updateCountdown();
    const timer = setInterval(updateCountdown, 1000);

    status.innerHTML =
        `<b>Client:</b> ${license.client}<br>` +
        `<b>Expires:</b> ${license.expires}`;

    function lock(reason) {
        document.body.innerHTML = `
            <div class="uk-container uk-padding">
                <div class="uk-alert-danger uk-padding">
                    <h3>Access Restricted</h3>
                    <p>${reason}</p>
                    <p>Redirecting...</p>
                </div>
            </div>
        `;

        setTimeout(() => {
            window.location.href = redirectURL;
        }, 2000);
    }

})
.catch(err => {
    status.innerHTML = "<b>Error:</b> Unable to load license";
    console.error(err);
});
</script>

</body>
</html>
